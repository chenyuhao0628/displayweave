  <!-- FAQPage structured data. Keep the questions/answers below in sync with the
       <details> FAQ in src/App.tsx (section#faq); this is a plain-text mirror. -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "How does it actually work?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The Mac creates a virtual display, captures it with ScreenCaptureKit, and hardware-encodes H.264 or HEVC with VideoToolbox. Apple receivers render with AVSampleBufferDisplayLayer; Android renders with MediaCodec and SurfaceView. Touch coordinates return to the Mac as input events."
        }
      },
      {
        "@type": "Question",
        "name": "Are signed release packages available?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Not yet under the DisplayWeave name. The repository is source-first while signing, notarization, and store metadata are prepared. Build instructions are in the README and future packages will be published through GitHub Releases."
        }
      },
      {
        "@type": "Question",
        "name": "Does Android work over USB?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The Mac sender implements Android USB with per-device ADB forward mappings and identity-safe Auto/WiFi fallback. Preview 0.1 physical-device, unplug/replug, and multi-device validation is still pending, so Android USB remains experimental. iPhone and iPad use macOS usbmuxd."
        }
      },
      {
        "@type": "Question",
        "name": "Does 120Hz mean stable 120 FPS?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. DisplayWeave can negotiate a 120fps target and request a 120Hz Android display mode, but actual throughput depends on the full pipeline. The validated OnePlus HEVC/120 WiFi run measured about 109-111 FPS end to end. High refresh remains experimental."
        }
      },
      {
        "@type": "Question",
        "name": "Why do I see the purple screen-recording indicator on my Mac?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "macOS shows that privacy indicator for every app that captures the screen — Duet, Luna, OBS and Zoom included. Apple Sidecar avoids it only because it's built into the OS. It's a feature, not a bug: you always know a capture is running."
        }
      },
      {
        "@type": "Question",
        "name": "WiFi mode can't find my iPhone — why?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "WiFi discovery needs the Local Network permission on both sides, and macOS/iOS deny it silently if the prompt was missed: check System Settings → Privacy & Security → Local Network on the Mac, and Settings → Privacy & Security → Local Network on the iPhone. Both devices must be on the same WiFi and the iPhone app must be open. The Mac app shows a live permission panel, and the iPhone app has a settings screen (shake the phone) that links straight there. USB mode needs none of this."
        }
      },
      {
        "@type": "Question",
        "name": "iPad support?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "The receiver is a universal iOS app and runs on iPad today. The inherited Apple receiver path supports more than one device, while broader DisplayWeave multi-device validation is ongoing. iPad-specific features such as Apple Pencil and pressure are on the roadmap."
        }
      },
      {
        "@type": "Question",
        "name": "Is any of my screen data sent to a server?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "No. One direct TCP connection between your Mac and your device. No accounts, no analytics, no cloud. The full story — what the apps store locally, which permissions they use and why, and the one current caveat about unencrypted WiFi transport — is on the privacy page."
        }
      },
      {
        "@type": "Question",
        "name": "What's the license? Can I fork it or use it commercially?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "DisplayWeave is licensed under GPL-3.0. You can use, study, and adapt it, including commercially, subject to that license. Distributed derivative versions must preserve the applicable GPL source and attribution obligations. DisplayWeave is independently maintained and derived from OpenDisplay; origin and SideScreen reference details are recorded in the third-party notices."
        }
      }
    ]
  }
