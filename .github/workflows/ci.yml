name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle
      - uses: android-actions/setup-android@v3
      - working-directory: AndroidReceiver
        run: ./gradlew --no-daemon test assembleDebug

  mac-and-swift:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - run: brew install xcodegen
      - run: xcodegen generate
      - name: Swift standalone policy tests
        run: ./tools/run-swift-self-tests.sh
      - name: macOS Debug build
        run: >-
          xcodebuild -project OpenSidecar.xcodeproj -scheme OpenSidecarMac
          -configuration Debug -derivedDataPath "$RUNNER_TEMP/mac-derived"
          CODE_SIGNING_ALLOWED=NO build
      - name: iOS Simulator compatibility build
        run: >-
          xcodebuild -project OpenSidecar.xcodeproj -scheme OpenSidecariOS
          -configuration Debug -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath "$RUNNER_TEMP/ios-derived"
          CODE_SIGNING_ALLOWED=NO build

  web-and-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm run check:docs
      - run: pnpm run check:release
      - run: git diff --check
