name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag/prerelease to build (for example v0.2.0-preview.2)"
        required: false
        type: string
      build_number:
        description: "Optional monotonic Mac build / Android version code"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_please:
    if: inputs.release_tag == ''
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          release-type: simple

  build-updates:
    needs: release_please
    if: >-
      always() &&
      (inputs.release_tag != '' || needs.release_please.outputs.release_created == 'true')
    runs-on: macos-26
    env:
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      DISPLAYWEAVE_ANDROID_KEYSTORE_BASE64: ${{ secrets.DISPLAYWEAVE_ANDROID_KEYSTORE_BASE64 }}
      DISPLAYWEAVE_ANDROID_STORE_PASSWORD: ${{ secrets.DISPLAYWEAVE_ANDROID_STORE_PASSWORD }}
      DISPLAYWEAVE_ANDROID_KEY_ALIAS: ${{ secrets.DISPLAYWEAVE_ANDROID_KEY_ALIAS }}
      DISPLAYWEAVE_ANDROID_KEY_PASSWORD: ${{ secrets.DISPLAYWEAVE_ANDROID_KEY_PASSWORD }}
      DISPLAYWEAVE_OUTPUT_DIR: ${{ github.workspace }}/build/update-release
      DISPLAYWEAVE_UPDATE_RELEASE: "1"
      DISPLAYWEAVE_BUILD_NUMBER: >-
        ${{ inputs.build_number != '' && inputs.build_number || github.run_number }}
      DISPLAYWEAVE_RELEASE_TAG: >-
        ${{ inputs.release_tag != '' && inputs.release_tag || needs.release_please.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          fetch-depth: 0

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install DMG metadata tools
        run: python3 -m pip install -r tools/dmg-requirements.txt

      - name: Prepare release versions and Android signing
        run: |
          set -euo pipefail
          echo "DISPLAYWEAVE_VERSION_NAME=${DISPLAYWEAVE_RELEASE_TAG#v}" >> "$GITHUB_ENV"
          keystore="$RUNNER_TEMP/displayweave-android-release.jks"
          echo "DISPLAYWEAVE_ANDROID_KEYSTORE=$keystore" >> "$GITHUB_ENV"
          printf '%s' "$DISPLAYWEAVE_ANDROID_KEYSTORE_BASE64" \
            | base64 -D > "$keystore"
          chmod 600 "$keystore"

      - name: Build and test Mac, unsigned iOS, and signed Android
        run: |
          set -euo pipefail
          # package-preview uses Mac/OpenSidecarMacAdHoc.entitlements and builds
          # OpenSidecariOS with CODE_SIGNING_ALLOWED=NO as a compatibility gate.
          ./tools/package-preview-0.1.sh

      - name: Verify Android signer with apksigner
        run: |
          set -euo pipefail
          "$ANDROID_HOME/build-tools/36.1.0/apksigner" verify \
            --verbose --print-certs \
            "$DISPLAYWEAVE_OUTPUT_DIR/DisplayWeave-Android.apk"

      - name: Generate signed Mac and verified Android update feeds
        env:
          DISPLAYWEAVE_RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/download
          DISPLAYWEAVE_ANDROID_APK: ${{ github.workspace }}/build/update-release/DisplayWeave-Android.apk
          DISPLAYWEAVE_ANDROID_FEED_OUTPUT: ${{ github.workspace }}/build/update-release/android-update.json
        run: |
          set -euo pipefail
          echo "DISPLAYWEAVE_PUBLISHED_AT=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"
          export DISPLAYWEAVE_PUBLISHED_AT="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          ./tools/generate-android-update-manifest.sh

          GEN_APPCAST="$(find build/preview-0.1-mac-derived/SourcePackages \
            -type f -path '*/Sparkle/bin/generate_appcast' -print -quit)"
          test -x "$GEN_APPCAST"
          printf '%s' "$SPARKLE_PRIVATE_KEY" | "$GEN_APPCAST" \
            --ed-key-file - \
            --download-url-prefix \
              "https://github.com/${GITHUB_REPOSITORY}/releases/download/${DISPLAYWEAVE_RELEASE_TAG}/" \
            --link "https://github.com/${GITHUB_REPOSITORY}" \
            --versions "$DISPLAYWEAVE_BUILD_NUMBER" \
            -o "$DISPLAYWEAVE_OUTPUT_DIR/appcast.xml" \
            "$DISPLAYWEAVE_OUTPUT_DIR"

          cd "$DISPLAYWEAVE_OUTPUT_DIR"
          shasum -a 256 \
            DisplayWeave-macOS.zip \
            DisplayWeave-macOS.dmg \
            DisplayWeave-Android.apk \
            DisplayWeave-Preview-0.1-iOS-unsigned-resigning-input.ipa \
            appcast.xml android-update.json > SHA256SUMS.txt

      - name: Verify the complete update release
        run: |
          set -euo pipefail
          ./tools/verify-update-release.sh "$DISPLAYWEAVE_OUTPUT_DIR"

      - name: Upload immutable update assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "$DISPLAYWEAVE_RELEASE_TAG" \
            "$DISPLAYWEAVE_OUTPUT_DIR/DisplayWeave-macOS.zip" \
            "$DISPLAYWEAVE_OUTPUT_DIR/DisplayWeave-macOS.dmg" \
            "$DISPLAYWEAVE_OUTPUT_DIR/DisplayWeave-Android.apk" \
            "$DISPLAYWEAVE_OUTPUT_DIR/DisplayWeave-Preview-0.1-iOS-unsigned-resigning-input.ipa" \
            "$DISPLAYWEAVE_OUTPUT_DIR/appcast.xml" \
            "$DISPLAYWEAVE_OUTPUT_DIR/android-update.json" \
            "$DISPLAYWEAVE_OUTPUT_DIR/SHA256SUMS.txt"

      - name: Publish update feeds to GitHub Pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/displayweave-feeds"
          cp "$DISPLAYWEAVE_OUTPUT_DIR/appcast.xml" \
            "$DISPLAYWEAVE_OUTPUT_DIR/android-update.json" \
            "$RUNNER_TEMP/displayweave-feeds/"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git switch --force-create main origin/main
          mkdir -p public
          cp "$RUNNER_TEMP/displayweave-feeds/appcast.xml" public/appcast.xml
          cp "$RUNNER_TEMP/displayweave-feeds/android-update.json" public/android-update.json
          git add public/appcast.xml public/android-update.json
          if ! git diff --cached --quiet -- public/appcast.xml public/android-update.json; then
            git commit -m "chore(release): publish update feeds for ${DISPLAYWEAVE_RELEASE_TAG} [skip ci]"
            git push origin main
          fi
          gh workflow run pages.yml --ref main

      - name: Clean signing material
        if: always()
        run: |
          rm -f "$DISPLAYWEAVE_ANDROID_KEYSTORE"
          rm -rf "$RUNNER_TEMP/displayweave-feeds"
