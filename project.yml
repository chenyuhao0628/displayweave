name: OpenSidecar
options:
  createIntermediateGroups: true
# DEVELOPMENT_TEAM comes from the environment (see generate.sh / .env) so no
# personal team ID lives in the repo. Unset = unsigned, fine for CI.
settings:
  base:
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
targets:
  OpenSidecarMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Mac
    info:
      path: Mac/Info.plist
      properties:
        NSPrincipalClass: NSApplication
        NSLocalNetworkUsageDescription: OpenSidecar connects to your phone over the local network in WiFi mode.
        NSBonjourServices: ["_opensidecar._tcp"]
        LSApplicationCategoryType: public.app-category.utilities
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.peet.opensidecar.mac
        PRODUCT_NAME: OpenSidecar
        SWIFT_OBJC_BRIDGING_HEADER: Mac/OpenSidecarMac-Bridging-Header.h
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  OpenSidecarPhone:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Phone
    info:
      path: Phone/Info.plist
      properties:
        CFBundleDisplayName: OpenSidecar
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        NSLocalNetworkUsageDescription: OpenSidecar advertises itself on the local network so your Mac can connect over WiFi.
        NSBonjourServices: ["_opensidecar._tcp"]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: sh.peet.opensidecar.phone
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
